kind = "web"
previewPath = "/"
title = "BD Tech Manager / Sales Navigator"
version = "1.0.0"
id = "artifacts/bd-tech-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20963

[services.development]
run = "pnpm --filter @workspace/bd-tech-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bd-tech-manager", "run", "build" ]
publicDir = "artifacts/bd-tech-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20963"
BASE_PATH = "/"
